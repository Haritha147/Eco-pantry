name: E2E Automation Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Root Dependencies
      run: npm install

    - name: Install Server Dependencies
      run: |
        cd server
        npm install

    - name: Start Application Background
      env:
        MONGO_URI: ${{ secrets.MONGO_URI }}
        PORT: 5000
      run: |
        npm run dev &
        
        # Wait for the frontend to be ready on port 5173
        echo "Waiting for app to start..."
        npx wait-on http://localhost:5173 -t 60000

    - name: Run E2E Tests
      run: node run_e2e_tests.js

    - name: Upload Test Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: e2e-test-report
        path: E2E_Test_Report*.xlsx
